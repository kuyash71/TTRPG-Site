name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/TTRPG-Site
            git pull origin main
            npm install
            export DATABASE_URL=$(node -e "const c=require('./server/ecosystem.config.cjs'); console.log(c.apps[0].env.DATABASE_URL)")
            DATABASE_URL=$DATABASE_URL npx prisma db push --accept-data-loss
            npm run build
            cd server && npm install && cd ..
            pm2 restart all
